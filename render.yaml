services:
  - type: web
    name: Amar Passport AI Agent
    env: docker
    plan: free
    branch: main
    dockerfilePath: Dockerfile
    buildCommand: docker build -t amar-passport-ai-agent .
    startCommand: /bin/sh /app/start.sh
    envVars:
      - key: ENVIRONMENT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VECTOR_DB_URL
        sync: false
      - key: APPOINTMENT_API_KEY
        sync: false
